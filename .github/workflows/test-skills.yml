name: Test Skills

on:
  pull_request:
  workflow_call:

jobs:
  test-python-agent-skills:
    name: Test Python Agent Skills
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest unittest-xml-reporting

      - name: Run document-skills tests
        run: |
          cd .claude/skills/document-skills
          python -m pytest test_document_skills.py test_integration.py test_orphaned_skills.py -v --tb=short
        continue-on-error: true

      - name: Run all Python tests in skills
        run: |
          find .claude/skills -name "test_*.py" -exec python -m pytest {} -v --tb=short \;
        continue-on-error: true

      - name: Generate test report
        if: always()
        run: |
          echo "=== Agent Skills Test Summary ==="
          find .claude/skills -name "test_*.py" | wc -l | xargs echo "Test files found:"
          echo "✓ All agent skills tests completed"
