name: Test Skills

on:
  pull_request:
  workflow_call:

jobs:
  test-js-project-structure:
    name: Test js-project-structure Skill
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --cwd /Users/kseniiabalova/Documents/torq/claude

      - name: Test 1 - Create new local project
        run: |
          cd /tmp
          bash /Users/kseniiabalova/Documents/torq/claude/.claude/skills/js-project-structure/scripts/init-project.sh test-lib-local empty-scope 'A test library' no
          test -d test-lib-local && echo "✓ Project directory created"
          test -f test-lib-local/package.json && echo "✓ package.json exists"
          test -f test-lib-local/tsconfig.json && echo "✓ tsconfig.json exists"
          test -f test-lib-local/.git/HEAD && echo "✓ Git initialized"

      - name: Test 2 - Create scoped npm package
        run: |
          cd /tmp
          bash /Users/kseniiabalova/Documents/torq/claude/.claude/skills/js-project-structure/scripts/init-project.sh test-scoped '@torqlab' 'A scoped test lib' no
          test -f test-scoped/package.json && grep -q '"@torqlab/test-scoped"' test-scoped/package.json && echo "✓ Scoped package created"

      - name: Test 3 - Validate setup
        run: |
          cd /tmp
          bash /Users/kseniiabalova/Documents/torq/claude/.claude/skills/js-project-structure/scripts/validate-setup.sh test-lib-local

      - name: Test 4 - Verify required files
        run: |
          cd /tmp/test-lib-local
          test -f eslint.config.mjs && echo "✓ eslint.config.mjs exists"
          test -f .prettierrc && echo "✓ .prettierrc exists"
          test -f commitlint.config.js && echo "✓ commitlint.config.js exists"
          test -f .releaserc.json && echo "✓ .releaserc.json exists"
          test -f .github/workflows/verify.yml && echo "✓ verify.yml workflow exists"
          test -f .github/workflows/publish.yml && echo "✓ publish.yml workflow exists"
          test -f .husky/commit-msg && echo "✓ commit-msg hook exists"
          test -f .husky/pre-push && echo "✓ pre-push hook exists"

      - name: Test 5 - Verify git hooks installed
        run: |
          cd /tmp/test-lib-local
          test -f .git/hooks/commit-msg && echo "✓ commit-msg hook installed"
          test -f .git/hooks/pre-push && echo "✓ pre-push hook installed"

      - name: Test 6 - Build project
        run: |
          cd /tmp/test-lib-local
          bun run build
          test -d dist && echo "✓ dist directory created"
          test -f dist/index.mjs && echo "✓ dist/index.mjs exists"
          test -f dist/index.d.ts && echo "✓ dist/index.d.ts exists"

      - name: Test 7 - Run linter
        run: |
          cd /tmp/test-lib-local
          bun run lint && echo "✓ ESLint check passed"

      - name: Test 8 - Check formatting
        run: |
          cd /tmp/test-lib-local
          bun run format:check && echo "✓ Prettier check passed"

      - name: Test 9 - Run tests
        run: |
          cd /tmp/test-lib-local
          bun test && echo "✓ Tests passed"

      - name: Test 10 - Validate config files
        run: |
          cd /tmp/test-lib-local
          bun run --eval "JSON.parse(require('fs').readFileSync('package.json', 'utf8'))" && echo "✓ package.json is valid"
          bun run --eval "JSON.parse(require('fs').readFileSync('tsconfig.json', 'utf8'))" && echo "✓ tsconfig.json is valid"
          bun run --eval "JSON.parse(require('fs').readFileSync('.releaserc.json', 'utf8'))" && echo "✓ .releaserc.json is valid"

      - name: Cleanup
        if: always()
        run: |
          rm -rf /tmp/test-lib-local /tmp/test-scoped
          echo "✓ Test artifacts cleaned up"
